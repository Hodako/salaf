version: "3.8"

services:
  salaf:
    image: codehub.farhansadiq.dev/salaf/salaf:latest
    env_file:
      - ./.env
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.salaf.rule=Host(`salaf.bd`)"
        - "traefik.http.routers.salaf.priority=5"
        - "traefik.http.routers.salaf.entrypoints=websecure"
        - "traefik.http.routers.salaf.tls.certresolver=leresolver"
        - "traefik.http.routers.salaf.tls=true"
        - "traefik.http.routers.salaf.service=salaf"
        - "traefik.http.services.salaf.loadbalancer.server.port=3000"
        - "traefik.swarm.network=traefik_proxy"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: traefik_proxy
